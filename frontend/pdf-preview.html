<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Assessment Form Preview | BBS Institute</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      background: var(--bg);
    }

    .preview-page {
      max-width: 920px;
      margin: 0 auto;
      padding: 24px;
    }

    .preview-toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
      margin-bottom: 20px;
    }

    .preview-shell {
      overflow-x: auto;
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 12px;
      box-shadow: var(--shadow);
    }

    @media print {
      .preview-toolbar {
        display: none;
      }

      .preview-page {
        padding: 0;
      }

      .preview-shell {
        border: none;
        box-shadow: none;
      }
    }
  </style>
</head>
<body>
  <div class="preview-page">
    <div class="preview-toolbar">
      <button type="button" onclick="generatePDF()">Download PDF</button>
      <button type="button" class="secondary" onclick="window.print()">Print</button>
      <button type="button" class="secondary" onclick="goBack()">Back to Dashboard</button>
    </div>

    <div class="preview-shell" id="preview-shell"></div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="pdf-generator.js"></script>
  <script>
    let currentFormData = null;

    function loadFormData() {
      const stored = sessionStorage.getItem('adminPdfPreviewData');
      if (!stored) {
        document.getElementById('preview-shell').innerHTML =
          '<p style="padding:24px;color:#000;">No preview data available. Open this page from the admin dashboard.</p>';
        return;
      }

      try {
        currentFormData = JSON.parse(stored);
        document.getElementById('preview-shell').innerHTML =
          window.PdfGenerator.buildAssessmentFormHtml(currentFormData);
      } catch (error) {
        console.error(error);
        document.getElementById('preview-shell').innerHTML =
          '<p style="padding:24px;color:#000;">Unable to load preview data.</p>';
      }
    }

    async function generatePDF() {
      if (!currentFormData) {
        alert('No form data available.');
        return;
      }

      const name = currentFormData.name || 'student';
      const fileName = `${name.replace(/\s+/g, '_')}-Assessment-Form.pdf`;

      try {
        await window.PdfGenerator.generateAssessmentPdf(currentFormData, fileName);
      } catch (error) {
        console.error(error);
        alert('Unable to generate PDF. Please try again.');
      }
    }

    function goBack() {
      window.location.href = 'admin.html';
    }

    loadFormData();
  </script>
</body>
</html>
